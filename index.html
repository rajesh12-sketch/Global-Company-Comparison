<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Analytics | Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              primary: {
                400: '#D4AF37', /* Premium Gold */
                500: '#B8860B', /* Darker Gold */
                600: '#996515',
              },
              gold: {
                DEFAULT: '#D4AF37',
                light: '#F5DEB3',
                dark: '#B8860B'
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020617; /* slate-950 */
        color: #f8fafc; /* slate-50 */
        font-family: 'Inter', system-ui, sans-serif;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b; 
        border-radius: 4px;
        border: 2px solid #0f172a;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #D4AF37; 
      }
      @media print {
        aside, header, button, .no-print { display: none !important; }
        main { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
        body { background-color: #ffffff !important; color: #000000 !important; }
        .bg-slate-900, .bg-slate-800, .bg-slate-950 { background-color: #ffffff !important; border: 1px solid #e2e8f0 !important; color: #000000 !important; }
        .text-white, .text-slate-200, .text-slate-300, .text-slate-400 { color: #000000 !important; }
        .border-slate-700, .border-slate-800 { border-color: #e2e8f0 !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.1/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.1",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
